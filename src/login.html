<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Login</title>
</head>
<body>
    <div class="page">
        <main class="card small-card">
            <div class="badge">Authentication</div>

            <h1>Welcome</h1>
            <p class="subtitle">Please sign in to continue.</p>

            <div class="button-group">
                <button id="loginBtn" class="btn btn-primary">Login / Sign up</button>
            </div>

            <p id="errorText" class="subtitle" style="margin-top: 16px;"></p>
        </main>
    </div>

    <script src="/lib/msal-browser.min.js"></script>
    <script src="/auth.js"></script>

    <script>
        async function startup() {
            const errorText = document.getElementById("errorText");
            const loginBtn = document.getElementById("loginBtn");

            try {
                await window.auth.initAuth();

                if (window.auth.isSignedIn()) {
                    window.location.href = "index.html";
                    return;
                }

                loginBtn.addEventListener("click", async () => {
                    try {
                        await window.auth.login();
                    } catch (e) {
                        errorText.textContent = "Login failed: " + e.message;
                    }
                });
            } catch (e) {
                errorText.textContent = "Startup failed: " + e.message;
            }
        }

        startup();
    </script>
</body>
</html>
