<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Quizbase Portal</title>
</head>
<body>
    <div class="page">
        <main class="card">
            <div class="badge"></div>
            <h1>Quizbase Portal</h1>
            <p class="subtitle">Call your API, edit your account, or sign out.</p>

            <div class="button-group">
                <button id="callApiBtn" class="btn btn-accent">Call API</button>
                <button id="editAccountBtn" class="btn btn-primary">Edit Account</button>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>

            <section class="output-section">
                <div class="output-header">
                    <span>Output</span>
                    <span class="status-dot"></span>
                </div>
                <pre id="output">Waiting for action...</pre>
            </section>
        </main>
    </div>

    <script src="/lib/msal-browser.min.js"></script>
    <script src="/auth.js"></script>
    <script src="/main.js"></script>
</body>
</html>
