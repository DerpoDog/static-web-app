<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Vanilla JavaScript App</title>
</head>
<body>
    <div class="page">
        <div class="background-glow glow-1"></div>
        <div class="background-glow glow-2"></div>

        <main class="card">
            <div class="badge">Frontend Demo</div>

            <h1>API Test Dashboard</h1>
            <p class="subtitle">
                Sign in, sign out, and test your API calls from a cleaner interface.
            </p>

            <div class="button-group">
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                <button id="callApiBtn" class="btn btn-accent">Call API</button>
            </div>

            <section class="output-section">
                <div class="output-header">
                    <span>Output</span>
                    <span class="status-dot"></span>
                </div>
                <pre id="output">Waiting for action...</pre>
            </section>
        </main>
    </div>

    <script src="/lib/msal-browser.min.js"></script>
    <script src="/auth.js"></script>
    <script src="/main.js"></script>
</body>
</html>
